[workspace]
members = [
    "crates/fns-client-headless",
    "crates/fns-core",
    "crates/fns-hash",
    "crates/fns-protocol",
    "crates/fns-sync-plan",
    "crates/fns-vault-fs",
    "crates/fns-ws-client",
]
resolver = "3"

[workspace.dependencies]
filetime = "0.2"
fns-core = { path = "crates/fns-core" }
fns-hash = { path = "crates/fns-hash" }
fns-protocol = { path = "crates/fns-protocol" }
fns-sync-plan = { path = "crates/fns-sync-plan" }
futures-util = "0.3"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = "1"
tokio-tungstenite = "0.29"
