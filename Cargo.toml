[workspace]
members = [
    "crates/fns-client-headless",
    "crates/fns-core",
    "crates/fns-hash",
    "crates/fns-protocol",
    "crates/fns-sync-plan",
]
resolver = "3"

[workspace.dependencies]
fns-core = { path = "crates/fns-core" }
fns-protocol = { path = "crates/fns-protocol" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
